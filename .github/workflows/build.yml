name: .NET Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore RfidAccessControl.sln

    - name: Build API
      run: dotnet build RfidAccessControl.Api/RfidAccessControl.Api.csproj --configuration Release

    - name: Run Unit Tests
      run: dotnet test RfidAccessControl.Tests/RfidAccessControl.Tests.csproj --verbosity normal