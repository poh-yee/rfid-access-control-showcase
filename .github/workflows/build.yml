name: .NET Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore RfidAccessControl.sln

    - name: Build Solution
      run: dotnet build RfidAccessControl.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test RfidAccessControl.Tests/RfidAccessControl.Tests.csproj --no-build --verbosity normal